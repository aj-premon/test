workflows:
  ios-device-build:
    name: iOS Device Build (Unsigned IPA)
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build for iOS Device (Unsigned)
        script: |
          xcodebuild \
            -project TicTacToe.xcodeproj \
            -scheme TicTacToe \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/output \
            clean build
      - name: Package into unsigned IPA
        script: |
          mkdir -p $CM_BUILD_DIR/ipa/Payload
          cp -r $CM_BUILD_DIR/output/TicTacToe.app $CM_BUILD_DIR/ipa/Payload/
          cd $CM_BUILD_DIR/ipa
          zip -r TicTacToe-Unsigned.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/ipa/TicTacToe-Unsigned.ipa
