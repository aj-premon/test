name: Build iOS TicTacToe

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to trigger it manually from GitHub

jobs:
  build:
    name: Build & Test (Simulator)
    runs-on: macos-14 # Uses Apple Silicon Mac with Xcode 15+

    steps:
      # 1. Check out your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Show available Xcode versions (useful for debugging)
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      # 3. Build for simulator (no signing needed)
      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project TicTacToe.xcodeproj \
            -scheme TicTacToe \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            clean build \
            | xcpretty || true

      # 4. (Optional) Build a real .ipa for device install
      #    Uncomment this step ONLY after you add signing secrets (see README)
